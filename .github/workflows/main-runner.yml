name: Vermillion Throw Rug Runner

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.13'
    - name: Cache venv
      id: cache-venv
      uses: actions/cache@v4
      with:
        path: .venv
        key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements.txt') }}
    - name: Install dependencies
      if: steps.cache-venv.outputs.cache-hit != 'true'
      run: |
        python -m venv .venv
        . .venv/bin/activate
        pip install -r requirements.txt
    - name: Run
      env:
        SWID: ${{ secrets.SWID }}
        ESPN_S2: ${{ secrets.ESPN_S2 }}
      run: |
        . .venv/bin/activate
        python vtr_runner.py -dp -s $SWID -e $ESPN_S2