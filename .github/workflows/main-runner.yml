name: Vermillion Throw Rug Runner

on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch: 

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Miniconda
      uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        python-version: "3.10"
        activate-environment: "vtr-env"
        environment-file: env.yml
    - name: Install dependencies
      shell: bash -l {0}
      run: |
        conda env update --file env.yml
    - name: Run
      shell: bash -l {0}
      run: python vtr_runner.py -d -p